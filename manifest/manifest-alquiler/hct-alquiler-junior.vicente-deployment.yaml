apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-alquiler-deployment
  namespace: hct-alquiler-junior-vicente
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-alquiler
  template:
    metadata:
      labels:
        app: ms-alquiler
    spec:
      containers:
        - name: ms-alquiler
          image: llampier2/hct-alquiler:latest
          ports:
            - containerPort: 8092
          env:
            - name: PORT
              value: "8092"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: ms-alquiler-secret
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ms-alquiler-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ms-alquiler-secret
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /alquileres
              port: 8092
            initialDelaySeconds: 30
            periodSeconds: 10
